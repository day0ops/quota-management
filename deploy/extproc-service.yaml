---
apiVersion: v1
kind: Service
metadata:
  name: quota-management-extproc
  namespace: agentgateway-system
  labels:
    app: quota-management-extproc
    app.kubernetes.io/managed-by: agentgateway-demo
spec:
  type: ClusterIP
  ports:
    - port: 4444
      targetPort: 4444
      protocol: TCP
      name: grpc
      appProtocol: kubernetes.io/h2c
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: metrics
  selector:
    app: quota-management-extproc
