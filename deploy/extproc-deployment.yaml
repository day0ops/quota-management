---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quota-management-extproc
  namespace: agentgateway-system
  labels:
    app: quota-management-extproc
    app.kubernetes.io/managed-by: agentgateway-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quota-management-extproc
  template:
    metadata:
      labels:
        app: quota-management-extproc
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '9090'
        prometheus.io/path: '/metrics'
    spec:
      serviceAccountName: quota-management
      containers:
        - name: extproc
          image: quota-budget-extproc:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4444
              name: grpc
            - containerPort: 9090
              name: metrics
          env:
            - name: GRPC_PORT
              value: '4444'
            - name: METRICS_PORT
              value: '9090'
            - name: DATABASE_URL
              value: 'postgres://budget:budget@quota-management-postgres:5432/budget_management?sslmode=disable'
            - name: MODEL_HEADER
              value: 'x-gateway-model-name'
            - name: LOG_LEVEL
              value: 'info'
            - name: LOG_FORMAT
              value: 'json'
            - name: DB_MAX_CONNECTIONS
              value: '10'
            # - name: DB_SSL_MODE
            #   value: 'verify-ca'
            # - name: DB_SSL_CA_CERT
            #   value: '/etc/tls/ca.crt'
          resources:
            requests:
              memory: '64Mi'
              cpu: '50m'
            limits:
              memory: '256Mi'
              cpu: '500m'
          # volumeMounts:
          #   - name: tls-certs
          #     mountPath: /etc/tls
          #     readOnly: true
      # volumes:
      #   - name: tls-certs
      #     secret:
      #       secretName: quota-management-db-tls
