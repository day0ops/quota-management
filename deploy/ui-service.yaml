---
apiVersion: v1
kind: Service
metadata:
  name: quota-management-ui
  namespace: agentgateway-system
  labels:
    app: quota-management-ui
    app.kubernetes.io/managed-by: agentgateway-demo
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
    - port: 9091
      targetPort: 9091
      protocol: TCP
      name: metrics
  selector:
    app: quota-management-ui
