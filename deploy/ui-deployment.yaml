---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quota-management-ui
  namespace: agentgateway-system
  labels:
    app: quota-management-ui
    app.kubernetes.io/managed-by: agentgateway-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quota-management-ui
  template:
    metadata:
      labels:
        app: quota-management-ui
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '9091'
        prometheus.io/path: '/metrics'
    spec:
      serviceAccountName: quota-management
      containers:
        - name: ui
          image: quota-management-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9091
              name: metrics
          env:
            - name: HTTP_PORT
              value: '8080'
            - name: METRICS_PORT
              value: '9091'
            - name: DATABASE_URL
              value: 'postgres://budget:budget@quota-management-postgres:5432/budget_management?sslmode=disable'
            - name: LOG_LEVEL
              value: 'info'
            - name: LOG_FORMAT
              value: 'json'
            - name: DB_MAX_CONNECTIONS
              value: '10'
            - name: AUDIT_RETENTION_DAYS
              value: '90'
            # - name: DB_SSL_MODE
            #   value: 'verify-ca'
            # - name: DB_SSL_CA_CERT
            #   value: '/etc/tls/ca.crt'
          resources:
            requests:
              memory: '64Mi'
              cpu: '50m'
            limits:
              memory: '256Mi'
              cpu: '500m'
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          # volumeMounts:
          #   - name: tls-certs
          #     mountPath: /etc/tls
          #     readOnly: true
      # volumes:
      #   - name: tls-certs
      #     secret:
      #       secretName: quota-management-db-tls
